name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test SimpleShareLibrary.Tests/SimpleShareLibrary.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test SimpleShareLibrary.IntegrationTests/SimpleShareLibrary.IntegrationTests.csproj --no-build --configuration Release --verbosity normal
