name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test SimpleShareLibrary.Tests/SimpleShareLibrary.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test SimpleShareLibrary.IntegrationTests/SimpleShareLibrary.IntegrationTests.csproj --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack SimpleShareLibrary/SimpleShareLibrary.csproj --no-build --configuration Release --output ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
